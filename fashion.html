<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fashion – Achy Shop</title>

  <link rel="stylesheet" href="style.css">

  <!-- SAMAKAN STRUKTUR DENGAN ABAYA -->
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .banner img {
      width: 100%;
      display: block;
    }

    .nav-box {
      display: flex;
      gap: 8px;
      padding: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .nav-box input {
      flex: 1;
      min-width: 120px;
      padding: 8px;
    }

    .nav-btn {
      padding: 8px 12px;
      border: none;
      cursor: pointer;
      background: #eee;
    }

    .nav-btn.active {
      background: black;
      color: white;
    }

    /* GRID SAMA SEPERTI ABAYA */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      padding: 10px;
      align-items: stretch;
    }

    /* CARD BIAR SAMA UKURAN */
    .card {
      display: flex;
      flex-direction: column;
      height: 100%;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .card-content {
      padding: 8px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .card-title {
      font-size: 14px;
      margin-bottom: 5px;
    }

    .card-price {
      margin-top: auto;
      font-weight: bold;
    }

    .wa-float {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 50px;
    }

    .wa-float img {
      width: 100%;
    }

    @media (max-width: 600px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .card img {
        height: 150px;
      }
    }
  </style>
</head>

<body>

<header class="header">

  <div class="banner">
    <img src="https://i.imgur.com/qZQWs7w.jpeg" alt="Banner Fashion">
  </div>

  <div class="nav-box">
    <input type="text" id="searchInput" placeholder="Cari produk...">

    <button class="nav-btn" onclick="location.href='/abaya.html'">ABAYA</button>
    <button class="nav-btn active" onclick="location.href='/fashion.html'">FASHION</button>
    <button class="nav-btn" onclick="location.href='/jaket.html'">JAKET</button>
  </div>

</header>

<main class="container">
  <div class="grid" id="productList"></div>
</main>

<a class="wa-float" href="https://s.shopee.co.id/5q4CZW9Exj" target="_blank">
  <img src="https://i.imgur.com/nVTuNOE.png">
</a>

<script src="data.js"></script>
<script src="main.js"></script>

</body>
</html>
